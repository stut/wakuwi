name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve release version
        id: version
        run: |
          DEV_VERSION=$(cat VERSION)
          RELEASE_VERSION="${DEV_VERSION%-dev}"
          MAJOR=$(echo $RELEASE_VERSION | cut -d. -f1)
          MINOR=$(echo $RELEASE_VERSION | cut -d. -f2)
          NEXT_VERSION="$MAJOR.$((MINOR + 1)).0-dev"
          echo "$RELEASE_VERSION" > VERSION
          echo "release=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: release v${{ steps.version.outputs.release }} [skip ci]"
          git tag "v${{ steps.version.outputs.release }}"
          git push
          git push --tags

      - name: Bump to next dev version
        run: |
          echo "${{ steps.version.outputs.next }}" > VERSION
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }} [skip ci]"
          git push

      - name: Build UI
        run: npm --prefix ui ci && npm --prefix ui run build

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION=${{ steps.version.outputs.version }}
          LDFLAGS="-X main.version=$VERSION"
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-linux-amd64   ./cmd/wakuwi
          CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-linux-arm64   ./cmd/wakuwi
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-darwin-amd64  ./cmd/wakuwi
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-darwin-arm64  ./cmd/wakuwi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
