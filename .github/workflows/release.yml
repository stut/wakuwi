name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump for the next dev cycle'
        type: choice
        default: minor
        options:
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy key bypasses the main-branch ruleset so the workflow can
          # push release commits and tags directly.
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve release version
        id: version
        run: |
          DEV_VERSION=$(cat VERSION)
          PENDING_VERSION="${DEV_VERSION%-dev}"
          MAJOR=$(echo $PENDING_VERSION | cut -d. -f1)
          MINOR=$(echo $PENDING_VERSION | cut -d. -f2)
          if [ "${{ inputs.bump }}" = "major" ]; then
            RELEASE_VERSION="$((MAJOR + 1)).0.0"
            NEXT_VERSION="$((MAJOR + 1)).1.0-dev"
          else
            RELEASE_VERSION="$MAJOR.$MINOR.0"
            NEXT_VERSION="$MAJOR.$((MINOR + 1)).0-dev"
          fi
          echo "$RELEASE_VERSION" > VERSION
          echo "release=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: release v${{ steps.version.outputs.release }} [skip ci]"
          git tag "v${{ steps.version.outputs.release }}"
          git push
          git push --tags

      - name: Bump to next dev version
        run: |
          echo "${{ steps.version.outputs.next }}" > VERSION
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }} [skip ci]"
          git push

      - name: Build UI
        run: npm --prefix ui ci && npm --prefix ui run build

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-X main.version=${{ steps.version.outputs.release }}"
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-linux-amd64   ./cmd/wakuwi
          CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-linux-arm64   ./cmd/wakuwi
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-darwin-amd64  ./cmd/wakuwi
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-darwin-arm64  ./cmd/wakuwi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.release }}
          tags: |
            ghcr.io/stut/wakuwi:v${{ steps.version.outputs.release }}
            ghcr.io/stut/wakuwi:latest

      - name: Create release
        run: |
          gh release create "v${{ steps.version.outputs.release }}" \
            --title "v${{ steps.version.outputs.release }}" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          ARM64_SHA=$(shasum -a 256 dist/wakuwi-darwin-arm64 | awk '{print $1}')
          AMD64_SHA=$(shasum -a 256 dist/wakuwi-darwin-amd64 | awk '{print $1}')
          python3 .github/scripts/update_tap.py \
            "${{ steps.version.outputs.release }}" \
            "$ARM64_SHA" \
            "$AMD64_SHA"
