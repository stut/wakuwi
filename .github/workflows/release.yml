name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve release version
        id: version
        run: |
          DEV_VERSION=$(cat VERSION)
          RELEASE_VERSION="${DEV_VERSION%-dev}"
          MAJOR=$(echo $RELEASE_VERSION | cut -d. -f1)
          MINOR=$(echo $RELEASE_VERSION | cut -d. -f2)
          NEXT_VERSION="$MAJOR.$((MINOR + 1)).0-dev"
          echo "$RELEASE_VERSION" > VERSION
          echo "release=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: release v${{ steps.version.outputs.release }} [skip ci]"
          git tag "v${{ steps.version.outputs.release }}"
          git push
          git push --tags

      - name: Bump to next dev version
        run: |
          echo "${{ steps.version.outputs.next }}" > VERSION
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }} [skip ci]"
          git push

      - name: Build UI
        run: npm --prefix ui ci && npm --prefix ui run build

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-X main.version=${{ steps.version.outputs.release }}"
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-linux-amd64   ./cmd/wakuwi
          CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-linux-arm64   ./cmd/wakuwi
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-darwin-amd64  ./cmd/wakuwi
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/wakuwi-darwin-arm64  ./cmd/wakuwi

      - name: Create release
        run: |
          gh release create "v${{ steps.version.outputs.release }}" \
            --title "v${{ steps.version.outputs.release }}" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.release }}
          ARM64_SHA=$(shasum -a 256 dist/wakuwi-darwin-arm64 | awk '{print $1}')
          AMD64_SHA=$(shasum -a 256 dist/wakuwi-darwin-amd64 | awk '{print $1}')

          FORMULA=$(cat << HEREDOC
class Wakuwi < Formula
  desc "Lightweight, read-only Kubernetes UI"
  homepage "https://github.com/stut/wakuwi"
  version "$VERSION"
  license "MIT"

  on_macos do
    on_arm do
      url "https://github.com/stut/wakuwi/releases/download/v#{version}/wakuwi-darwin-arm64"
      sha256 "$ARM64_SHA"
    end
    on_intel do
      url "https://github.com/stut/wakuwi/releases/download/v#{version}/wakuwi-darwin-amd64"
      sha256 "$AMD64_SHA"
    end
  end

  def install
    bin.install Dir["wakuwi-darwin-*"].first => "wakuwi"
  end

  service do
    run [opt_bin/"wakuwi"]
    keep_alive true
    log_path var/"log/wakuwi.log"
    error_log_path var/"log/wakuwi.log"
  end

  def caveats
    <<~EOS
      To start wakuwi as a background service:
        brew services start stut/tools/wakuwi

      Or run it manually:
        wakuwi

      Then open http://localhost:9753 in your browser.
    EOS
  end

  test do
    assert_match version.to_s, shell_output("#{bin}/wakuwi --version 2>&1", 1)
  end
end
HEREDOC
)

          FILE_SHA=$(gh api repos/stut/homebrew-tools/contents/Formula/wakuwi.rb --jq '.sha')
          CONTENT=$(echo "$FORMULA" | base64 -w 0)

          gh api \
            --method PUT \
            repos/stut/homebrew-tools/contents/Formula/wakuwi.rb \
            --field message="chore: update wakuwi to v$VERSION" \
            --field "sha=$FILE_SHA" \
            --field "content=$CONTENT"
